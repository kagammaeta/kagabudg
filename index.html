<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KA Treasury · Gamma Eta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #CEB888;
  --gold-dim: #9A8352;
  --cream: #F5F0E8;
}

html, body {
  height: 100%;
  background: #130610;
  overflow: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--cream);
}

/* Deep garnet-to-black background */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 85% 50% at 50% 5%, rgba(120,47,64,0.48) 0%, transparent 68%),
    radial-gradient(ellipse 65% 40% at 50% 100%, rgba(74,26,38,0.6) 0%, transparent 62%),
    linear-gradient(170deg, #130610 0%, #2a0c14 48%, #130610 100%);
}

/* Gold hairline at top */
.top-rule {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 1px;
  z-index: 10;
  background: linear-gradient(90deg, transparent 5%, var(--gold-dim) 35%, var(--gold) 50%, var(--gold-dim) 65%, transparent 95%);
}

.page {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  animation: rise 1.2s cubic-bezier(0.22, 0.8, 0.36, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}

/* Kicker above logo */
.kicker {
  font-family: 'Cinzel', serif;
  font-size: clamp(8px, 1vw, 10px);
  letter-spacing: 0.34em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 2rem;
  opacity: 0;
  animation: rise 1s ease 0.35s both;
}

/* ── LOGO ── */
.logo-wrap {
  position: relative;
  width: clamp(190px, 24vw, 300px);
  margin-bottom: 2rem;
  opacity: 0;
  animation: logoUp 1.2s cubic-bezier(0.22, 0.8, 0.36, 1) 0.08s both;
}

@keyframes logoUp {
  from { opacity: 0; transform: scale(0.93) translateY(18px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.logo-wrap img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
  user-select: none;
  /* Invert to white, then add subtle glow */
  filter:
    brightness(0) invert(1)
    drop-shadow(0 0 28px rgba(206,184,136,0.10))
    drop-shadow(0 6px 20px rgba(0,0,0,0.8));
  transition: filter 0.5s ease;
}

/* On sword hover: warm gold shift — no ring, no border, just color */
.logo-wrap.hovered img {
  filter:
    brightness(0) saturate(100%)
    invert(87%) sepia(22%) saturate(420%) hue-rotate(338deg) brightness(106%)
    drop-shadow(0 0 40px rgba(206,184,136,0.38))
    drop-shadow(0 6px 20px rgba(0,0,0,0.7));
}

/* ── SWORD HITZONE ── */
/*
  The swords in your logo sit in the lower ~40% of the image.
  This invisible button covers exactly that zone.
  No visual feedback except the logo color shift above.
*/
.sword-btn {
  position: absolute;
  bottom: 4%;
  left: 4%;
  right: 4%;
  height: 42%;
  background: transparent;
  border: none;
  outline: none;
  cursor: pointer;
  /* No ::before, no ::after, no rings. Clean. */
}

.sword-btn:focus-visible {
  /* Accessibility only — keyboard users see a faint outline */
  outline: 1px solid rgba(206,184,136,0.3);
  outline-offset: 2px;
}

/* ── TITLE ── */
.title-block {
  text-align: center;
  opacity: 0;
  animation: rise 1s ease 0.5s both;
}

.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 2.8vw, 34px);
  font-weight: 600;
  color: var(--cream);
  letter-spacing: 0.08em;
  line-height: 1.1;
  margin-bottom: 0.45rem;
}

.title span { color: var(--gold); }

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 1.4vw, 16px);
  font-weight: 300;
  font-style: italic;
  color: rgba(206,184,136,0.45);
  letter-spacing: 0.05em;
}

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  margin-top: 1.5rem;
  width: clamp(140px, 20vw, 240px);
  opacity: 0;
  animation: rise 1s ease 0.65s both;
}

.divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.divider-line:last-child {
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}
.divider-pip {
  width: 4px; height: 4px;
  background: var(--gold-dim);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ── PAGE EXIT ── */
.flash {
  position: fixed;
  inset: 0;
  background: rgba(245,240,232,0.04);
  pointer-events: none;
  opacity: 0;
  z-index: 300;
  transition: opacity 0.15s ease;
}
.flash.go { opacity: 1; }

/* ── FOOTER ── */
.footer {
  position: fixed;
  bottom: 1.25rem;
  left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(206,184,136,0.18);
  text-transform: uppercase;
  opacity: 0;
  animation: rise 1.8s ease 1s both;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="top-rule"></div>
<div class="flash" id="flash"></div>

<main class="page">

  <p class="kicker">Kappa Alpha Order &nbsp;·&nbsp; Gamma Eta Chapter</p>

  <div class="logo-wrap" id="logo-wrap">
    <!--
      Point src at your SVG file.
      If it's in the same folder: src="ka-logo.svg"
      If it's in an assets folder: src="assets/ka-logo.svg"
    -->
    <img
      src="ka-logo.svg"
      alt="Kappa Alpha Gamma Eta crest"
      id="logo-img"
      draggable="false"
    >

    <!-- Zero-UI secret button over the swords -->
    <button
      class="sword-btn"
      id="sword-btn"
      aria-label="Enter treasury dashboard"
    ></button>
  </div>

  <div class="title-block">
    <h1 class="title">KA <span>Treasury</span></h1>
    <p class="subtitle">Florida State University &nbsp;·&nbsp; 2025–2026</p>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-pip"></div>
    <div class="divider-line"></div>
  </div>

</main>

<footer class="footer">Dieu et les Dames &nbsp;·&nbsp; Est. 1865</footer>

<script>
'use strict';

const wrap  = document.getElementById('logo-wrap');
const btn   = document.getElementById('sword-btn');
const flash = document.getElementById('flash');

// Gold shift on hover — no rings, no labels, nothing else
btn.addEventListener('mouseenter', () => wrap.classList.add('hovered'));
btn.addEventListener('mouseleave', () => wrap.classList.remove('hovered'));

function enterDashboard() {
  flash.classList.add('go');

  // Fade out smoothly
  const page = document.querySelector('.page');
  page.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
  page.style.opacity = '0';
  page.style.transform = 'scale(1.02)';

  setTimeout(() => {
    // ← swap this for your actual dashboard filename
    window.location.href = 'dashboard.html';
  }, 460);
}

btn.addEventListener('click', enterDashboard);

// Optional: Enter key also works
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') enterDashboard();
});
</script>

</body>
</html>
