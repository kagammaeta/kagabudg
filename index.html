<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KA Treasury · Gamma Eta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:     #CEB888;
  --gold-dim: #9A8352;
  --garnet:   #782F40;
  --cream:    #F5F0E8;
  --cream-3:  rgba(245,240,232,.38);
}

html, body {
  height: 100%;
  background: #0e040a;
  overflow: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(120,47,64,.55) 0%, transparent 65%),
    radial-gradient(ellipse 70% 45% at 15% 100%, rgba(74,26,38,.45)  0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(46,13,22,.6)   0%, transparent 55%),
    linear-gradient(175deg, #0e040a 0%, #200a10 45%, #0e040a 100%);
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .025;
  pointer-events: none;
}

/* Gold rule */
.top-rule {
  position: fixed; top: 0; left: 0; right: 0; height: 1px; z-index: 20;
  background: linear-gradient(90deg, transparent 5%, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent 95%);
}

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
  animation: pageRise 1.4s cubic-bezier(0.22, 0.8, 0.36, 1) both;
}

@keyframes pageRise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

/* ── KICKER ── */
.kicker {
  font-family: 'Cinzel', serif;
  font-size: clamp(7.5px, .95vw, 9.5px);
  letter-spacing: .38em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 2.25rem;
  opacity: 0;
  animation: fadeSlide 1s ease .38s both;
  transition: opacity .4s ease, transform .4s ease;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

/* ── LOGO WRAP ── */
.logo-wrap {
  position: relative;
  width: clamp(180px, 22vw, 290px);
  margin-bottom: 2.25rem;
  opacity: 0;
  animation: logoRise 1.3s cubic-bezier(0.16, 1, 0.3, 1) .1s both;
  /* This is the element we animate during unlock */
  transform-origin: center center;
  will-change: transform, opacity, filter;
}

@keyframes logoRise {
  from { opacity: 0; transform: scale(.91) translateY(22px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Crest image */
.logo-img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  will-change: filter;
  filter:
    brightness(0) invert(1)
    drop-shadow(0 0 20px rgba(206,184,136,.08))
    drop-shadow(0 8px 28px rgba(0,0,0,.9));
}

/* Monogram fallback */
.logo-fallback {
  display: none;
  font-family: 'Cinzel', serif;
  font-size: clamp(56px, 9vw, 96px);
  font-weight: 600;
  color: rgba(245,240,232,.9);
  letter-spacing: .04em;
  line-height: 1;
  text-align: center;
  padding: 1rem;
  text-shadow: 0 0 24px rgba(206,184,136,.12), 0 8px 24px rgba(0,0,0,.8);
  user-select: none;
}

/* ── HOVER ── */
.logo-wrap.hovered .logo-img {
  filter:
    brightness(0) saturate(100%)
    invert(87%) sepia(24%) saturate(400%) hue-rotate(337deg) brightness(108%)
    drop-shadow(0 0 36px rgba(206,184,136,.42))
    drop-shadow(0 8px 24px rgba(0,0,0,.7));
}
.logo-wrap.hovered .logo-fallback {
  color: #E8D5A3;
  text-shadow: 0 0 40px rgba(206,184,136,.4), 0 8px 24px rgba(0,0,0,.7);
}

/* ── UNLOCK ANIMATION ── */
/*
  One continuous motion on .logo-wrap:
    scale: 1 → 1.55  (comes toward viewer)
    opacity: 1 → 0   (dissolves as it passes through)

  CSS transition does all the work — JS just adds the class.
  Duration 900ms, ease-in so it starts composed then accelerates
  into the screen — feels like a vault seal opening toward you.
*/
.logo-wrap.unlocking {
  transition:
    transform 950ms cubic-bezier(0.4, 0, 0.8, 1),
    opacity   800ms cubic-bezier(0.55, 0, 1, 0.45) 80ms,
    filter    400ms ease;
  transform: scale(1.55) !important;
  opacity: 0 !important;
  filter:
    brightness(0) saturate(100%)
    invert(87%) sepia(28%) saturate(500%) hue-rotate(334deg) brightness(118%)
    drop-shadow(0 0 80px rgba(206,184,136,.7))
    drop-shadow(0 0 140px rgba(206,184,136,.35)) !important;
}

/* Surrounding text fades out during unlock */
.page.unlocking .kicker,
.page.unlocking .title-block,
.page.unlocking .divider,
.page.unlocking .entry-hint {
  opacity: 0 !important;
  transform: translateY(6px) !important;
  transition: opacity .45s ease, transform .45s ease;
}

/* ── SWORD HITZONE ── */
.sword-btn {
  position: absolute;
  bottom: 5%;
  left: 6%; right: 6%;
  height: 40%;
  background: transparent;
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 50% 50% 44% 44%;
  z-index: 10;
}
.sword-btn:focus-visible {
  outline: 1px solid rgba(206,184,136,.3);
  outline-offset: 3px;
  border-radius: 50%;
}

/* Mobile: whole logo clickable */
@media (hover: none), (max-width: 600px) {
  .sword-btn { inset: 0; height: 100%; border-radius: 12px; }
}

/* ── TITLE ── */
.title-block {
  text-align: center;
  opacity: 0;
  animation: fadeSlide 1s ease .52s both;
  transition: opacity .4s ease, transform .4s ease;
}
.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 3.2vw, 38px);
  font-weight: 600;
  color: var(--cream);
  letter-spacing: .09em;
  line-height: 1.1;
  margin-bottom: .5rem;
}
.title span { color: var(--gold); }
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 1.5vw, 16px);
  font-weight: 300;
  font-style: italic;
  color: var(--cream-3);
  letter-spacing: .06em;
}

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: .9rem;
  margin-top: 1.65rem;
  width: clamp(130px, 18vw, 220px);
  opacity: 0;
  animation: fadeSlide 1s ease .66s both;
  transition: opacity .4s ease, transform .4s ease;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
.divider-line:last-child { background: linear-gradient(90deg, var(--gold-dim), transparent); }
.divider-diamond { width: 4px; height: 4px; background: var(--gold-dim); transform: rotate(45deg); flex-shrink: 0; }

/* ── HINT ── */
.entry-hint {
  font-family: 'Cinzel', serif;
  font-size: clamp(7px, .85vw, 8.5px);
  letter-spacing: .28em;
  color: rgba(206,184,136,.28);
  text-transform: uppercase;
  margin-top: 1.1rem;
  opacity: 0;
  animation: hintFade 1.2s ease 1.9s both;
  pointer-events: none;
  text-align: center;
  transition: opacity .35s ease;
}
@keyframes hintFade { from { opacity: 0; } to { opacity: 1; } }
.logo-wrap.hovered ~ .title-block ~ .divider ~ .entry-hint { opacity: 0 !important; }

/* ── EXIT VEIL — fades to black before redirect ── */
.exit-veil {
  position: fixed; inset: 0;
  background: #0e040a;
  pointer-events: none;
  opacity: 0; z-index: 500;
  transition: opacity .6s ease;
}
.exit-veil.go { opacity: 1; }

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 1.4rem; left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 7.5px; letter-spacing: .26em;
  color: rgba(206,184,136,.16);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeSlide 2s ease 1.1s both;
  transition: opacity .4s ease;
}
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>
<div class="top-rule" aria-hidden="true"></div>
<div class="exit-veil" id="exit-veil" aria-hidden="true"></div>

<main class="page" id="page" role="main">

  <p class="kicker">Kappa Alpha Order &nbsp;·&nbsp; Gamma Eta Chapter</p>

  <div class="logo-wrap" id="logo-wrap">
    <img
      src="ka-logo.svg"
      alt="Kappa Alpha Gamma Eta chapter crest"
      class="logo-img"
      id="logo-img"
      draggable="false"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"
    >
    <div class="logo-fallback" id="logo-fallback" aria-hidden="true">ΚΑ</div>

    <button
      class="sword-btn"
      id="sword-btn"
      aria-label="Enter the KA Treasury dashboard"
      tabindex="0"
    ></button>
  </div>

  <div class="title-block">
    <h1 class="title">KA <span>Treasury</span></h1>
    <p class="subtitle">Florida State University &nbsp;·&nbsp; 2025–2026</p>
  </div>

  <div class="divider" aria-hidden="true">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <p class="entry-hint" aria-hidden="true">Access hidden within the crest</p>

</main>

<footer class="footer" id="footer">Dieu et les Dames &nbsp;·&nbsp; Est. 1865</footer>

<script>
'use strict';

const wrap     = document.getElementById('logo-wrap');
const btn      = document.getElementById('sword-btn');
const page     = document.getElementById('page');
const footer   = document.getElementById('footer');
const exitVeil = document.getElementById('exit-veil');
const hint     = document.querySelector('.entry-hint');
let entered    = false;

/* ── HOVER ── */
btn.addEventListener('mouseenter', () => {
  wrap.classList.add('hovered');
  if (hint) hint.style.opacity = '0';
});
btn.addEventListener('mouseleave', () => wrap.classList.remove('hovered'));
btn.addEventListener('touchstart', () => wrap.classList.add('hovered'), { passive: true });
btn.addEventListener('touchend', () => {
  setTimeout(() => wrap.classList.remove('hovered'), 500);
}, { passive: true });

/* ════════════════════════════════════════════
   UNLOCK SEQUENCE
   ─────────────────────────────────────────
     0ms   surroundings fade away
    60ms   crest begins scaling toward viewer
            + golds up and dissolves in one
              continuous CSS transition (950ms)
   480ms   black veil starts rising
  1080ms   navigate to dashboard
════════════════════════════════════════════ */
function enterDashboard() {
  if (entered) return;
  entered = true;

  wrap.classList.remove('hovered');

  /* Step 1 — text around crest fades out immediately */
  page.classList.add('unlocking');
  footer.style.opacity = '0';

  /* Step 2 — short pause then crest fires its animation */
  setTimeout(() => {
    wrap.classList.add('unlocking');
  }, 60);

  /* Step 3 — black veil fades in as crest peaks */
  setTimeout(() => {
    exitVeil.classList.add('go');
  }, 480);

  /* Step 4 — navigate once screen is black */
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1080);
}

btn.addEventListener('click', enterDashboard);

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    enterDashboard();
  }
});
</script>
</body>
</html>
