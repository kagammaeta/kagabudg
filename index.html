<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KA Treasury · Gamma Eta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:     #CEB888;
  --gold-dim: #9A8352;
  --garnet:   #782F40;
  --cream:    #F5F0E8;
  --cream-3:  rgba(245,240,232,.38);
}

html, body {
  height: 100%;
  background: #0e040a;
  overflow: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(120,47,64,.55) 0%, transparent 65%),
    radial-gradient(ellipse 70% 45% at 15% 100%, rgba(74,26,38,.45)  0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(46,13,22,.6)   0%, transparent 55%),
    linear-gradient(175deg, #0e040a 0%, #200a10 45%, #0e040a 100%);
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .025;
  pointer-events: none;
}

/* Gold rule */
.top-rule {
  position: fixed; top: 0; left: 0; right: 0; height: 1px; z-index: 20;
  background: linear-gradient(90deg, transparent 5%, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent 95%);
}

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
  animation: pageRise 1.4s cubic-bezier(0.22, 0.8, 0.36, 1) both;
  will-change: opacity, transform;
}

@keyframes pageRise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

/* ── KICKER ── */
.kicker {
  font-family: 'Cinzel', serif;
  font-size: clamp(7.5px, .95vw, 9.5px);
  letter-spacing: .38em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 2.25rem;
  opacity: 0;
  animation: fadeSlide 1s ease .38s both;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

/* ── LOGO ASSEMBLY ── */
/*
  .logo-wrap       — outer positioner, handles scale + opacity during unlock
  .logo-stage      — inner layer: holds the img and sword overlays together
  .logo-img        — the actual crest image
  .sword-overlay   — two SVG swords drawn over the crest sword area
  .sword-left      — animates outward-left on unlock
  .sword-right     — animates outward-right on unlock
*/

.logo-wrap {
  position: relative;
  width: clamp(180px, 22vw, 290px);
  margin-bottom: 2.25rem;
  opacity: 0;
  animation: logoRise 1.3s cubic-bezier(0.16, 1, 0.3, 1) .1s both;
  filter: drop-shadow(0 0 60px rgba(120,47,64,.2));
  will-change: transform, opacity, filter;
}

@keyframes logoRise {
  from { opacity: 0; transform: scale(.91) translateY(22px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.logo-stage {
  position: relative;
  width: 100%;
}

/* Base crest image */
.logo-img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  transition:
    filter  .55s cubic-bezier(0.4, 0, 0.2, 1),
    transform .55s cubic-bezier(0.4, 0, 0.2, 1);
  filter:
    brightness(0) invert(1)
    drop-shadow(0 0 20px rgba(206,184,136,.08))
    drop-shadow(0 8px 24px rgba(0,0,0,.85));
  will-change: filter, transform;
}

/* Monogram fallback */
.logo-fallback {
  display: none;
  font-family: 'Cinzel', serif;
  font-size: clamp(56px, 9vw, 96px);
  font-weight: 600;
  color: rgba(245,240,232,.9);
  letter-spacing: .04em;
  line-height: 1;
  text-align: center;
  padding: 1rem;
  text-shadow: 0 0 24px rgba(206,184,136,.12), 0 8px 24px rgba(0,0,0,.8);
  transition: color .55s ease, text-shadow .55s ease;
  user-select: none;
}

/* ── SWORD OVERLAYS ── */
/*
  Positioned absolutely over the crest.
  Sized to cover the sword area (bottom ~50% of logo).
  Hidden by default — revealed only at unlock time.
  Each sword has its own transform-origin at its handle end.
*/
.sword-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0; /* invisible until unlock triggers */
}

.sword-overlay svg {
  width: 100%;
  height: 100%;
}

/* Left sword — transform-origin at its pommel (bottom-left) */
.sword-left {
  transform-origin: 22% 88%;
  transition:
    transform 700ms cubic-bezier(0.22, 0.8, 0.36, 1),
    opacity   200ms ease;
  will-change: transform, opacity;
}

/* Right sword — transform-origin at its pommel (bottom-right) */
.sword-right {
  transform-origin: 78% 88%;
  transition:
    transform 700ms cubic-bezier(0.22, 0.8, 0.36, 1),
    opacity   200ms ease;
  will-change: transform, opacity;
}

/* ── HOVER STATES ── */
.logo-wrap.hovered .logo-img {
  filter:
    brightness(0) saturate(100%)
    invert(87%) sepia(24%) saturate(400%) hue-rotate(337deg) brightness(108%)
    drop-shadow(0 0 36px rgba(206,184,136,.42))
    drop-shadow(0 8px 24px rgba(0,0,0,.7));
  transform: scale(1.025);
}

.logo-wrap.hovered .logo-fallback {
  color: #E8D5A3;
  text-shadow: 0 0 40px rgba(206,184,136,.4), 0 8px 24px rgba(0,0,0,.7);
}

/* ── UNLOCK ANIMATION STATES ── */

/* Phase 1: logo warms gold and begins scaling */
.logo-wrap.unlocking .logo-img,
.logo-wrap.unlocking .logo-fallback {
  filter:
    brightness(0) saturate(100%)
    invert(85%) sepia(32%) saturate(520%) hue-rotate(334deg) brightness(115%)
    drop-shadow(0 0 52px rgba(206,184,136,.65))
    drop-shadow(0 0 80px rgba(206,184,136,.3))
    drop-shadow(0 8px 24px rgba(0,0,0,.5));
  transform: scale(1.0);
  transition:
    filter   .5s cubic-bezier(0.22, 0.8, 0.36, 1),
    transform .5s cubic-bezier(0.22, 0.8, 0.36, 1);
}

/* Phase 2: swords become visible when unlocking starts */
.logo-wrap.unlocking .sword-overlay {
  opacity: 1;
  transition: opacity 80ms ease;
}

/* Phase 3: crest scales toward viewer and fades */
.logo-wrap.vaulting {
  transition:
    transform  900ms cubic-bezier(0.22, 0.8, 0.36, 1),
    opacity    700ms cubic-bezier(0.4, 0, 0.2, 1),
    filter     700ms ease;
  transform: scale(1.2);
  opacity: 0;
  filter:
    drop-shadow(0 0 90px rgba(206,184,136,.6))
    drop-shadow(0 0 120px rgba(206,184,136,.25));
}

/* Sword open positions — applied via JS after short delay */
.sword-left.open {
  transform: rotate(-18deg) translate(-4%, 3%);
}

.sword-right.open {
  transform: rotate(18deg) translate(4%, 3%);
}

/* ── SWORD HITZONE ── */
.sword-btn {
  position: absolute;
  bottom: 5%;
  left: 6%; right: 6%;
  height: 40%;
  background: transparent;
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 50% 50% 44% 44%;
  z-index: 10;
}

.sword-btn:focus-visible {
  outline: 1px solid rgba(206,184,136,.3);
  outline-offset: 3px;
  border-radius: 50%;
}

/* Mobile: whole crest is clickable */
@media (hover: none), (max-width: 600px) {
  .sword-btn {
    inset: 0;
    height: 100%;
    border-radius: 12px;
  }
}

/* ── TITLE ── */
.title-block {
  text-align: center;
  opacity: 0;
  animation: fadeSlide 1s ease .52s both;
  will-change: opacity, transform;
}

.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 3.2vw, 38px);
  font-weight: 600;
  color: var(--cream);
  letter-spacing: .09em;
  line-height: 1.1;
  margin-bottom: .5rem;
}
.title span { color: var(--gold); }

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 1.5vw, 16px);
  font-weight: 300;
  font-style: italic;
  color: var(--cream-3);
  letter-spacing: .06em;
}

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: .9rem;
  margin-top: 1.65rem;
  width: clamp(130px, 18vw, 220px);
  opacity: 0;
  animation: fadeSlide 1s ease .66s both;
}
.divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.divider-line:last-child {
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}
.divider-diamond {
  width: 4px; height: 4px;
  background: var(--gold-dim);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ── HINT ── */
.entry-hint {
  font-family: 'Cinzel', serif;
  font-size: clamp(7px, .85vw, 8.5px);
  letter-spacing: .28em;
  color: rgba(206,184,136,.28);
  text-transform: uppercase;
  margin-top: 1.1rem;
  opacity: 0;
  animation: hintFade 1.2s ease 1.9s both;
  pointer-events: none;
  text-align: center;
  transition: opacity .4s ease;
}

@keyframes hintFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.logo-wrap.hovered ~ .title-block ~ .divider ~ .entry-hint { opacity: 0 !important; }

/* ── EXIT OVERLAY ── */
/* Fades to solid black before redirect */
.exit-veil {
  position: fixed; inset: 0;
  background: #0e040a;
  pointer-events: none;
  opacity: 0; z-index: 500;
  transition: opacity .65s ease;
}
.exit-veil.go { opacity: 1; }

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 1.4rem; left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 7.5px; letter-spacing: .26em;
  color: rgba(206,184,136,.16);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeSlide 2s ease 1.1s both;
  transition: opacity .4s ease;
}

/* ── SURROUNDING ELEMENTS FADE ON UNLOCK ── */
.page.unlocking .kicker,
.page.unlocking .title-block,
.page.unlocking .divider,
.page.unlocking .entry-hint {
  transition: opacity .5s ease, transform .5s ease;
  opacity: 0;
  transform: translateY(-8px);
}
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>
<div class="top-rule" aria-hidden="true"></div>
<div class="exit-veil" id="exit-veil" aria-hidden="true"></div>

<main class="page" id="page" role="main">

  <p class="kicker" aria-label="Kappa Alpha Order, Gamma Eta Chapter">
    Kappa Alpha Order &nbsp;·&nbsp; Gamma Eta Chapter
  </p>

  <div class="logo-wrap" id="logo-wrap">
    <div class="logo-stage" id="logo-stage">

      <!-- Real crest — white normally, gold on hover/unlock -->
      <img
        src="ka-logo.svg"
        alt="Kappa Alpha Gamma Eta chapter crest"
        class="logo-img"
        id="logo-img"
        draggable="false"
        onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"
      >

      <!-- Fallback monogram if SVG missing -->
      <div class="logo-fallback" id="logo-fallback" aria-hidden="true">ΚΑ</div>

      <!--
        SWORD OVERLAYS
        These two SVGs are drawn to match the crossed-saber geometry
        of the KA Gamma Eta crest (viewBox 0 0 500 560).

        Left saber:  blade runs upper-left → lower-right
        Right saber: blade runs upper-right → lower-left
        They cross at roughly (250, 330) in the logo's coordinate space.

        transform-origin is set at the pommel (handle end) of each sword
        so the rotation pivots from the base, like a real door hinge.
      -->

      <!-- Left sword overlay -->
      <div class="sword-overlay sword-left" id="sword-left" aria-hidden="true">
        <svg viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
          <g style="filter:brightness(0) saturate(100%) invert(87%) sepia(24%) saturate(400%) hue-rotate(337deg) brightness(108%)">
            <!-- Blade — left sword, tip points upper-left, pommel lower-right -->
            <path d="
              M 22 248
              C 80 270, 170 310, 250 336
              C 330 362, 420 390, 462 410
              L 466 400
              C 424 380, 334 352, 252 326
              C 170 300, 80 260, 22 236
              Z
            " opacity="0.95"/>
            <!-- Guard -->
            <path d="
              M 218 316 C 222 306, 232 300, 244 305
              C 256 310, 260 322, 258 332
              C 250 330, 242 326, 230 322 Z
            " opacity="0.95"/>
            <!-- Grip -->
            <path d="M 22 248 C 18 240, 12 230, 8 220 L 16 215 C 18 226, 22 238, 28 244 Z" opacity="0.95"/>
            <!-- Pommel -->
            <ellipse cx="10" cy="212" rx="12" ry="16" opacity="0.95"/>
          </g>
        </svg>
      </div>

      <!-- Right sword overlay -->
      <div class="sword-overlay sword-right" id="sword-right" aria-hidden="true">
        <svg viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
          <g style="filter:brightness(0) saturate(100%) invert(87%) sepia(24%) saturate(400%) hue-rotate(337deg) brightness(108%)">
            <!-- Blade — right sword, tip points upper-right, pommel lower-left -->
            <path d="
              M 478 248
              C 420 270, 330 310, 250 336
              C 170 362, 80 390, 38 410
              L 34 400
              C 76 380, 166 352, 248 326
              C 330 300, 420 260, 478 236
              Z
            " opacity="0.95"/>
            <!-- Guard -->
            <path d="
              M 282 316 C 278 306, 268 300, 256 305
              C 244 310, 240 322, 242 332
              C 250 330, 258 326, 270 322 Z
            " opacity="0.95"/>
            <!-- Grip -->
            <path d="M 478 248 C 482 240, 488 230, 492 220 L 484 215 C 482 226, 478 238, 472 244 Z" opacity="0.95"/>
            <!-- Pommel -->
            <ellipse cx="490" cy="212" rx="12" ry="16" opacity="0.95"/>
          </g>
        </svg>
      </div>

      <!-- Secret entrance button — sword zone desktop / full crest mobile -->
      <button
        class="sword-btn"
        id="sword-btn"
        aria-label="Enter the KA Treasury dashboard"
        tabindex="0"
      ></button>

    </div><!-- /.logo-stage -->
  </div><!-- /.logo-wrap -->

  <div class="title-block" id="title-block">
    <h1 class="title">KA <span>Treasury</span></h1>
    <p class="subtitle">Florida State University &nbsp;·&nbsp; 2025–2026</p>
  </div>

  <div class="divider" aria-hidden="true">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <p class="entry-hint" aria-hidden="true">Access hidden within the crest</p>

</main>

<footer class="footer" id="footer" aria-label="Chapter motto and founding year">
  Dieu et les Dames &nbsp;·&nbsp; Est. 1865
</footer>

<script>
'use strict';

const wrap      = document.getElementById('logo-wrap');
const btn       = document.getElementById('sword-btn');
const swordL    = document.getElementById('sword-left');
const swordR    = document.getElementById('sword-right');
const exitVeil  = document.getElementById('exit-veil');
const page      = document.getElementById('page');
const footer    = document.getElementById('footer');
const hint      = document.querySelector('.entry-hint');
let entered     = false;

/* ════════════════════════════════════════
   HOVER — gold shift before click
════════════════════════════════════════ */
btn.addEventListener('mouseenter', () => {
  wrap.classList.add('hovered');
  if (hint) hint.style.opacity = '0';
});
btn.addEventListener('mouseleave', () => wrap.classList.remove('hovered'));

/* Touch feedback */
btn.addEventListener('touchstart', () => wrap.classList.add('hovered'), { passive: true });
btn.addEventListener('touchend',   () => {
  setTimeout(() => wrap.classList.remove('hovered'), 500);
}, { passive: true });

/* ════════════════════════════════════════
   VAULT UNLOCK ANIMATION

   Timeline:
     0ms    — phase 1: logo warms gold, sword overlays appear
     120ms  — phase 2: swords swing open (pivot from pommel)
     300ms  — phase 3: surrounding text fades out
     380ms  — phase 4: crest scales toward viewer and dissolves
     500ms  — exit veil (black) begins fading in
     1050ms — navigate to dashboard.html
════════════════════════════════════════ */
function enterDashboard() {
  if (entered) return;
  entered = true;

  wrap.classList.remove('hovered');

  /* ── Phase 1 (0ms): Warm logo gold, show sword overlays ── */
  wrap.classList.add('unlocking');

  /* ── Phase 2 (120ms): Swords swing outward ── */
  setTimeout(() => {
    swordL.classList.add('open');
    swordR.classList.add('open');
  }, 120);

  /* ── Phase 3 (300ms): Text elements fade up and out ── */
  setTimeout(() => {
    page.classList.add('unlocking');
    footer.style.opacity = '0';
  }, 300);

  /* ── Phase 4 (400ms): Crest scales toward viewer and dissolves ── */
  setTimeout(() => {
    wrap.classList.add('vaulting');
  }, 400);

  /* ── Phase 5 (520ms): Black veil starts fading in ── */
  setTimeout(() => {
    exitVeil.classList.add('go');
  }, 520);

  /* ── Navigate (1060ms): Once fully black ── */
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1060);
}

btn.addEventListener('click', enterDashboard);

/* Keyboard: Enter or Space */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    enterDashboard();
  }
});
</script>

</body>
</html>
