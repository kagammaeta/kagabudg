<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" role="img" aria-labelledby="title desc">
  <title id="title">KA Gamma Eta crest logo</title>
  <desc id="desc">KA serif monogram above crossed sabers and Gamma Eta wordmark in FSU garnet and gold.</desc>

  <defs>
    <linearGradient id="garnet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8C1D2C"/>
      <stop offset="100%" stop-color="#5C1A26"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B15F"/>
      <stop offset="100%" stop-color="#B89A4A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <text x="410" y="305" text-anchor="middle" font-size="260" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="10" fill="url(#garnet)">KA</text>

    <path d="M95 430 C 250 620, 570 620, 725 430" fill="none" stroke="url(#garnet)" stroke-width="20" stroke-linecap="round"/>

    <g stroke-linecap="round" fill="none">
      <path d="M175 560 Q410 535 645 560" stroke="url(#gold)" stroke-width="16"/>
      <path d="M645 560 Q410 595 175 560" stroke="url(#garnet)" stroke-width="13"/>
      <circle cx="165" cy="560" r="10" fill="url(#gold)"/>
      <circle cx="655" cy="560" r="10" fill="url(#gold)"/>
      <path d="M198 566c2 28 22 48 56 48 35 0 55-21 56-48" stroke="url(#gold)" stroke-width="11"/>
      <path d="M510 566c2 28 22 48 56 48 35 0 55-21 56-48" stroke="url(#gold)" stroke-width="11"/>
    </g>

    <text x="410" y="725" text-anchor="middle" font-size="58" font-family="'IBM Plex Sans', Arial, sans-serif" font-weight="600" letter-spacing="12" fill="#8A7030">GAMMA ETA</text>
  </g>
</svg>
