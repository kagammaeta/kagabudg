<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 900" role="img" aria-labelledby="title desc">
  <title id="title">KA Gamma Eta Logo</title>
  <desc id="desc">Refined KA monogram with crossed sabers and Gamma Eta wordmark in garnet and gold.</desc>
  <defs>
    <linearGradient id="garnet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E4B8"/>
      <stop offset="1" stop-color="#DDBA6A"/>
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2f0d16" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g fill="url(#garnet)" filter="url(#goldGlow)">
    <text x="460" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="286" font-weight="700" letter-spacing="8">KA</text>
  </g>

  <g fill="none" stroke="url(#garnet)" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)">
    <path d="M90 390 C 245 560, 675 560, 830 390" stroke-width="16"/>
    <path d="M140 610 Q460 585 780 610" stroke-width="14"/>
    <path d="M780 610 Q460 670 140 610" stroke-width="11"/>
    <circle cx="140" cy="610" r="12" fill="url(#garnet)"/>
    <circle cx="780" cy="610" r="12" fill="url(#garnet)"/>
    <path d="M173 616c3 22 21 41 53 41 30 0 49-17 53-41" stroke-width="10"/>
    <path d="M640 616c3 22 21 41 53 41 30 0 49-17 53-41" stroke-width="10"/>
  </g>

  <text x="460" y="810" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" letter-spacing="14" fill="url(#garnet)" filter="url(#goldGlow)">GAMMA ETA</text>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" role="img" aria-labelledby="title desc">
  <title id="title">KA Gamma Eta Mark</title>
  <desc id="desc">KA monogram with crossed sabers and Gamma Eta wordmark in garnet and gold.</desc>
  <defs>
    <linearGradient id="kaGarnet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9E2235"/>
      <stop offset="1" stop-color="#5C1A26"/>
    </linearGradient>
    <linearGradient id="kaGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7C678"/>
      <stop offset="1" stop-color="#B89A4A"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <text x="450" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="300" font-weight="700" letter-spacing="8" fill="url(#kaGarnet)">KA</text>

    <path d="M70 455 C 230 650, 670 650, 830 455" stroke="url(#kaGold)" stroke-width="20"/>

    <path d="M140 710 Q 450 680 760 710" stroke="url(#kaGarnet)" stroke-width="18"/>
    <path d="M760 710 Q 450 780 140 710" stroke="url(#kaGold)" stroke-width="14"/>

    <circle cx="140" cy="710" r="14" fill="url(#kaGarnet)"/>
    <circle cx="760" cy="710" r="14" fill="url(#kaGarnet)"/>

    <path d="M165 718c6 28 25 47 59 47 33 0 53-18 58-47" stroke="url(#kaGold)" stroke-width="11"/>
    <path d="M620 718c6 28 25 47 59 47 33 0 53-18 58-47" stroke="url(#kaGold)" stroke-width="11"/>
  </g>

  <text x="450" y="890" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="74" letter-spacing="16" fill="url(#kaGold)">GAMMA ETA</text>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">KA Gamma Eta Logo</title>
  <desc id="desc">KA letters above crossed sabers in garnet and gold.</desc>
  <defs>
    <linearGradient id="garnet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E2A3A"/>
      <stop offset="100%" stop-color="#5C1A26"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B15F"/>
      <stop offset="100%" stop-color="#B89A4A"/>
    </linearGradient>
  </defs>
  <rect width="720" height="720" rx="24" fill="transparent"/>
  <text x="360" y="260" text-anchor="middle" font-size="200" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="url(#garnet)" letter-spacing="8">KA</text>
  <path d="M90 380 C 220 520, 500 520, 630 380" fill="none" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
  <path d="M170 520 Q360 510 550 520" fill="none" stroke="url(#garnet)" stroke-width="14" stroke-linecap="round"/>
  <path d="M170 520 Q360 544 550 520" fill="none" stroke="url(#gold)" stroke-width="11" stroke-linecap="round"/>
  <text x="360" y="620" text-anchor="middle" font-size="48" font-family="'IBM Plex Sans', Arial, sans-serif" letter-spacing="10" fill="#8A7030">GAMMA ETA</text>
</svg>
